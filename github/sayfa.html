<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürün QR Sistemi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  .header { background: #fff; border-bottom: 0.5px solid #ddd; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 13px; color: #888; }
  .back-btn { background: none; border: none; color: #2563eb; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 0; }

  /* ADMIN PAGE */
  .admin-container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  /* ADD PRODUCT FORM */
  .form-card { background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; padding: 20px; margin-bottom: 28px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: #555; }
  input, textarea, select {
    padding: 9px 12px; border: 0.5px solid #ddd; border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #fafafa; color: #1a1a1a;
    outline: none; transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: #2563eb; background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  .add-btn {
    background: #2563eb; color: #fff; border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer;
    margin-top: 12px; transition: background 0.15s;
  }
  .add-btn:hover { background: #1d4ed8; }

  /* PRODUCT LIST */
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .product-card {
    background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; padding: 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .product-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .product-name { font-size: 15px; font-weight: 600; }
  .product-price { font-size: 14px; font-weight: 600; color: #2563eb; }
  .product-brand { font-size: 12px; color: #888; margin-top: 2px; }
  .qr-container { display: flex; justify-content: center; padding: 10px 0; }
  .qr-container canvas, .qr-container img { border-radius: 6px; }
  .qr-label { text-align: center; font-size: 11px; color: #aaa; }
  .card-actions { display: flex; gap: 8px; }
  .btn-detail { flex: 1; padding: 8px; border: 0.5px solid #e0e0e0; background: #f5f5f5; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center; }
  .btn-delete { padding: 8px 12px; border: 0.5px solid #fca5a5; background: #fff5f5; color: #dc2626; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-delete:hover { background: #fee2e2; }
  .btn-detail:hover { background: #e8e8e8; }
  .btn-print { padding: 8px 12px; border: 0.5px solid #bbf7d0; background: #f0fdf4; color: #16a34a; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .btn-print:hover { background: #dcfce7; }
  .empty-state { text-align: center; padding: 60px 20px; color: #aaa; grid-column: 1 / -1; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* DETAIL PAGE (telefon görünümü) */
  .detail-wrapper { min-height: 100vh; background: #f5f5f0; }
  .product-hero { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: #fff; padding: 30px 20px 40px; text-align: center; }
  .product-hero .brand-badge { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-bottom: 10px; }
  .product-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .product-hero .price-tag { font-size: 28px; font-weight: 800; margin-top: 10px; }
  .product-hero .price-label { font-size: 12px; opacity: 0.75; }

  .detail-content { padding: 20px 16px; max-width: 500px; margin: 0 auto; }
  .detail-card { background: #fff; border-radius: 14px; border: 0.5px solid #e0e0e0; margin-bottom: 14px; overflow: hidden; }
  .detail-card-header { padding: 14px 16px 8px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 0.5px solid #f0f0f0; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid #f5f5f5; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row-label { font-size: 13px; color: #888; }
  .detail-row-value { font-size: 14px; font-weight: 500; text-align: right; max-width: 55%; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-blue { background: #dbeafe; color: #1d4ed8; }
  .badge-orange { background: #ffedd5; color: #c2410c; }
  .desc-text { padding: 12px 16px; font-size: 14px; color: #444; line-height: 1.6; }
  .contact-btn { display: block; background: #2563eb; color: #fff; text-align: center; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; width: 100%; margin-top: 6px; }
  .contact-btn:hover { background: #1d4ed8; }

  /* PRINT */
  @media print {
    body { background: white; }
    .header, .form-card, .card-actions, .admin-container .section-title:first-of-type + .form-card { display: none; }
    .products-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .product-card { break-inside: avoid; border: 1px solid #ddd; }
    .page { display: block !important; }
    #detailPage { display: none !important; }
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .products-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ADMIN PAGE -->
<div id="adminPage" class="page active">
  <div class="header">
    <h1>📦 Ürün QR Sistemi</h1>
    <span class="header-sub">Yönetim Paneli</span>
  </div>
  <div class="admin-container">

    <p class="section-title">Yeni Ürün Ekle</p>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label>Ürün Adı *</label>
          <input type="text" id="f_name" placeholder="ör. Samsung Galaxy S24">
        </div>
        <div class="form-group">
          <label>Marka</label>
          <input type="text" id="f_brand" placeholder="ör. Samsung">
        </div>
        <div class="form-group">
          <label>Fiyat *</label>
          <input type="text" id="f_price" placeholder="ör. 24.999 TL">
        </div>
        <div class="form-group">
          <label>Garanti Süresi</label>
          <input type="text" id="f_warranty" placeholder="ör. 2 Yıl">
        </div>
        <div class="form-group">
          <label>Menşei / Üretim Yeri</label>
          <input type="text" id="f_origin" placeholder="ör. Güney Kore">
        </div>
        <div class="form-group">
          <label>Durum</label>
          <select id="f_status">
            <option value="Stokta">Stokta</option>
            <option value="Son Ürünler">Son Ürünler</option>
            <option value="Tükendi">Tükendi</option>
          </select>
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <input type="text" id="f_category" placeholder="ör. Elektronik, Giyim, Gıda...">
        </div>
        <div class="form-group">
          <label>SKU / Ürün Kodu</label>
          <input type="text" id="f_sku" placeholder="ör. SAM-S24-256">
        </div>
        <div class="form-group full">
          <label>Açıklama</label>
          <textarea id="f_desc" placeholder="Ürün hakkında kısa bir açıklama yazın..."></textarea>
        </div>
        <div class="form-group">
          <label>Özellik 1 (Başlık)</label>
          <input type="text" id="f_spec1_k" placeholder="ör. Ekran">
        </div>
        <div class="form-group">
          <label>Özellik 1 (Değer)</label>
          <input type="text" id="f_spec1_v" placeholder="ör. 6.2'' AMOLED">
        </div>
        <div class="form-group">
          <label>Özellik 2 (Başlık)</label>
          <input type="text" id="f_spec2_k" placeholder="ör. RAM">
        </div>
        <div class="form-group">
          <label>Özellik 2 (Değer)</label>
          <input type="text" id="f_spec2_v" placeholder="ör. 8 GB">
        </div>
        <div class="form-group">
          <label>Özellik 3 (Başlık)</label>
          <input type="text" id="f_spec3_k" placeholder="ör. Depolama">
        </div>
        <div class="form-group">
          <label>Özellik 3 (Değer)</label>
          <input type="text" id="f_spec3_v" placeholder="ör. 256 GB">
        </div>
        <div class="form-group">
          <label>Özellik 4 (Başlık)</label>
          <input type="text" id="f_spec4_k" placeholder="ör. Batarya">
        </div>
        <div class="form-group">
          <label>Özellik 4 (Değer)</label>
          <input type="text" id="f_spec4_v" placeholder="ör. 4000 mAh">
        </div>
      </div>
      <button class="add-btn" onclick="addProduct()">+ Ürün Ekle ve QR Oluştur</button>
    </div>

    <p class="section-title">Ürün Listesi ve QR Kodları</p>
    <div class="products-grid" id="productsGrid">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <p>Henüz ürün eklenmedi.<br>Yukarıdan ilk ürününüzü ekleyin.</p>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div id="detailPage" class="page">
  <div class="header">
    <button class="back-btn" onclick="showAdmin()">← Geri</button>
    <span class="header-sub">Ürün Detayı</span>
    <span></span>
  </div>
  <div class="detail-wrapper">
    <div class="product-hero" id="detailHero"></div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('qr_products') || '[]');

function saveProducts() {
  localStorage.setItem('qr_products', JSON.stringify(products));
}

function val(id) { return document.getElementById(id).value.trim(); }
function clear(id) { document.getElementById(id).value = ''; }

function addProduct() {
  const name = val('f_name');
  const price = val('f_price');
  if (!name || !price) { alert('Ürün adı ve fiyat zorunludur!'); return; }

  const product = {
    id: Date.now(),
    name, price,
    brand: val('f_brand'),
    warranty: val('f_warranty'),
    origin: val('f_origin'),
    status: val('f_status'),
    category: val('f_category'),
    sku: val('f_sku'),
    desc: val('f_desc'),
    specs: [
      { k: val('f_spec1_k'), v: val('f_spec1_v') },
      { k: val('f_spec2_k'), v: val('f_spec2_v') },
      { k: val('f_spec3_k'), v: val('f_spec3_v') },
      { k: val('f_spec4_k'), v: val('f_spec4_v') },
    ].filter(s => s.k && s.v)
  };

  products.unshift(product);
  saveProducts();
  renderProducts();

  ['f_name','f_brand','f_price','f_warranty','f_origin','f_category','f_sku','f_desc',
   'f_spec1_k','f_spec1_v','f_spec2_k','f_spec2_v','f_spec3_k','f_spec3_v','f_spec4_k','f_spec4_v']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_status').value = 'Stokta';
}

function deleteProduct(id) {
  if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
  products = products.filter(p => p.id !== id);
  saveProducts();
  renderProducts();
}

function showDetail(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;

  const statusClass = p.status === 'Stokta' ? 'badge-green' : p.status === 'Son Ürünler' ? 'badge-orange' : 'badge-orange';

  document.getElementById('detailHero').innerHTML = `
    ${p.brand ? `<div class="brand-badge">${p.brand}</div>` : ''}
    <h2>${p.name}</h2>
    ${p.category ? `<div style="opacity:0.7;font-size:13px;margin-top:4px;">${p.category}</div>` : ''}
    <div class="price-label">Satış Fiyatı</div>
    <div class="price-tag">${p.price}</div>
  `;

  let content = '';

  // Temel bilgiler
  content += `<div class="detail-card">
    <div class="detail-card-header">Ürün Bilgileri</div>`;
  if (p.brand) content += row('Marka', p.brand);
  if (p.sku) content += row('Ürün Kodu', `<code style="font-size:13px;">${p.sku}</code>`);
  if (p.origin) content += row('Menşei', p.origin);
  if (p.warranty) content += row('Garanti', `<span class="badge badge-blue">${p.warranty}</span>`);
  if (p.status) content += row('Stok Durumu', `<span class="badge ${statusClass}">${p.status}</span>`);
  content += `</div>`;

  // Teknik özellikler
  if (p.specs && p.specs.length > 0) {
    content += `<div class="detail-card">
      <div class="detail-card-header">Teknik Özellikler</div>`;
    p.specs.forEach(s => { content += row(s.k, s.v); });
    content += `</div>`;
  }

  // Açıklama
  if (p.desc) {
    content += `<div class="detail-card">
      <div class="detail-card-header">Ürün Açıklaması</div>
      <div class="desc-text">${p.desc}</div>
    </div>`;
  }

  content += `<button class="contact-btn" onclick="alert('Mağazamızı arayın veya ziyaret edin!')">📞 Bilgi Al</button>`;
  content += `<p style="text-align:center;font-size:11px;color:#bbb;margin-top:16px;padding-bottom:30px;">Bu sayfa QR kod ile açılmıştır.</p>`;

  document.getElementById('detailContent').innerHTML = content;
  document.getElementById('adminPage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');
  window.scrollTo(0, 0);
}

function row(label, value) {
  return `<div class="detail-row">
    <span class="detail-row-label">${label}</span>
    <span class="detail-row-value">${value}</span>
  </div>`;
}

function showAdmin() {
  document.getElementById('detailPage').classList.remove('active');
  document.getElementById('adminPage').classList.add('active');
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (products.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Henüz ürün eklenmedi.<br>Yukarıdan ilk ürününüzü ekleyin.</p></div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card" id="card_${p.id}">
      <div class="product-card-header">
        <div>
          <div class="product-name">${p.name}</div>
          ${p.brand ? `<div class="product-brand">${p.brand}</div>` : ''}
        </div>
        <div class="product-price">${p.price}</div>
      </div>
      <div class="qr-container" id="qr_${p.id}"></div>
      <div class="qr-label">QR kodu telefona okutun</div>
      <div class="card-actions">
        <button class="btn-detail" onclick="showDetail(${p.id})">👁 Ön İzleme</button>
        <button class="btn-print" onclick="printCard(${p.id})">🖨</button>
        <button class="btn-delete" onclick="deleteProduct(${p.id})">✕</button>
      </div>
    </div>
  `).join('');

  products.forEach(p => {
    const el = document.getElementById('qr_' + p.id);
    if (!el || el.querySelector('canvas')) return;
    const url = "https://emre-gunes.github.io/qr-sistemi/?product=" + p.id;
    new QRCode(el, { text: url, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.M });
  });
}

function printCard(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const url = "https://emre-gunes.github.io/qr-sistemi/?product=" + p.id;
  const w = window.open('', '_blank');
  w.document.write(`
    <html><head><title>QR - ${p.name}</title>
    <style>body{font-family:sans-serif;text-align:center;padding:30px;}
    h2{font-size:18px;margin-bottom:4px;}p{color:#555;font-size:14px;margin:4px 0;}
    #qr{margin:16px auto;}</style></head>
    <body>
    <h2>${p.name}</h2>
    ${p.brand ? `<p>${p.brand}</p>` : ''}
    <p style="font-size:18px;font-weight:700;color:#2563eb;">${p.price}</p>
    ${p.warranty ? `<p>Garanti: ${p.warranty}</p>` : ''}
    <div id="qr"></div>
    <p style="font-size:11px;color:#aaa;margin-top:8px;">QR kodu okutun, ürün detaylarını görün</p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    <script>new QRCode(document.getElementById('qr'),{text:'${url}',width:200,height:200});<\/script>
    </body></html>
  `);
  w.document.close();
  setTimeout(() => w.print(), 800);
}

// QR ile açılış kontrolü
function checkQRParam() {
  const params = new URLSearchParams(window.location.search);
  const pid = parseInt(params.get('product'));
  if (pid) {
    const p = products.find(x => x.id === pid);
    if (p) {
      setTimeout(() => showDetail(pid), 100);
      return;
    }
  }
}

// Demo ürünler
function addDemoProducts() {
  if (products.length > 0) return;
  products = [
    {
      id: 1001, name: 'Samsung Galaxy S24', brand: 'Samsung', price: '24.999 TL',
      warranty: '2 Yıl', origin: 'Güney Kore', status: 'Stokta',
      category: 'Akıllı Telefon', sku: 'SAM-S24-256',
      desc: 'Samsung\'un amiral gemisi akıllı telefonu. Güçlü işlemcisi ve gelişmiş kamera sistemi ile öne çıkıyor.',
      specs: [{ k: 'Ekran', v: '6.2" Dynamic AMOLED' }, { k: 'RAM', v: '8 GB' }, { k: 'Depolama', v: '256 GB' }, { k: 'Batarya', v: '4000 mAh' }]
    },
    {
      id: 1002, name: 'Nike Air Max 270', brand: 'Nike', price: '3.499 TL',
      warranty: '6 Ay', origin: 'Vietnam', status: 'Son Ürünler',
      category: 'Spor Ayakkabı', sku: 'NIKE-AM270-42',
      desc: 'Maksimum konfor için tasarlanmış Air Max yastıklama teknolojisi. Şık ve spor tasarım.',
      specs: [{ k: 'Numara', v: '42' }, { k: 'Renk', v: 'Siyah/Beyaz' }, { k: 'Materyal', v: 'Sentetik' }, { k: 'Taban', v: 'Air Max' }]
    }
  ];
  saveProducts();
}

addDemoProducts();
renderProducts();
checkQRParam();
</script>
</body>
</html>
